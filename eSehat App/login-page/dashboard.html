<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Sehat Nabha - User Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- Navigation Header -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>e-Sehat Nabha</h2>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-link active">Dashboard</a>
                <a href="../login-page/user-appointments.html" class="nav-link">Appointments</a>
                <a href="../login-page/orders.html" class="nav-link">Orders</a>
                <!--<a href="#" class="nav-link">Prescriptions</a>-->
                <!-- Removed Appointments and Prescriptions -->
                <div class="user-profile">
                    <img id="userAvatar" src="https://ui-avatars.com/api/?name=User+Name&background=random" alt="User Profile">
                    <span class="userName">User Name</span> <i class="fas fa-chevron-down"></i>
                    <div class="dropdown-menu">
                        <span class="userName">User Name</span>
                        <!-- Removed Profile and Settings -->
                        <a href="../home-page/index.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="dashboard-container">
        <!-- Welcome Section -->
        <div class="welcome-section">
            <div class="welcome-text">
                <h1>Welcome back, <span class="userName">User Name</span>!</h1>
                <p>Here's your health dashboard with all your medical information</p>
            </div>
            <div class="header-actions">
                <button class="seminar-btn">
                    <i class="fas fa-users"></i> Join Seminar and Get Discount
                </button>
                <div class="date-credits">
                    <p id="currentDate"></p>
                    <button class="credits-btn">
                        <i class="fas fa-coins"></i> My Credits
                    </button>
                </div>
            </div>
        </div>

        <!-- Personal Information Section -->
        <div class="user-details-section">
            <div class="section-header">
                <h2>Personal Information</h2>
                <!-- Removed Edit Profile Button -->
                <!-- <button class="edit-btn" id="editProfileBtn"><i class="fas fa-edit"></i> Edit Profile</button> -->
            </div>

            <div class="details-container">
                <div class="detail-item">
                    <label>Full Name</label>
                    <p id="userFullName">Loading...</p>
                </div>
                <div class="detail-item">
                    <label>Email Address</label>
                    <p id="userEmail">Loading...</p>
                </div>
                <div class="detail-item">
                    <label>Phone Number</label>
                    <p id="userPhone_number">Loading...</p>
                </div>
                <div class="detail-item">
                    <label>Date of Birth</label>
                    <p id="userDob">Loading...</p>
                </div>
                <div class="detail-item">
                    <label>Gender</label>
                    <p id="userGender">Loading...</p>
                </div>
                <div class="detail-item full-width">
                    <label>Address</label>
                    <p id="userAddress">Loading...</p>
                </div>
                <div class="detail-item">
                    <label>City</label>
                    <p id="userCity">Loading...</p>
                </div>
                <div class="detail-item">
                    <label>Pincode</label>
                    <p id="userPincode">Loading...</p>
                </div>
            </div>
        </div>

        

        <!-- Commented Out Other Sections -->
        <!-- 
        <div class="dashboard-cards"> ... </div>
        <div class="medical-info-section"> ... </div>
        <div class="recent-activity"> ... </div>
        -->
    </main>

    <!-- JS -->
    <script src="dashboard.js"></script>
</body>
</html>
